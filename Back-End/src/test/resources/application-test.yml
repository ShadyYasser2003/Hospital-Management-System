# =============================================================================
#  Test configuration — uses H2 in-memory database.
#  No real secrets. Safe to commit.
# =============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:hms_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: WARN
    com.hospital: WARN

jwt:
  secret: test-only-secret-key-not-for-production-use-minimum-64-chars-aaaa
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

hospital:
  name: "Test Hospital"
  email: test@hospital.com
  blood-bank-email: test-blood@hospital.com

paypal:
  client-id: test-paypal-client-id
  client-secret: test-paypal-secret
  mode: sandbox

kashier:
  merchant-id: test-merchant
  api-key: test-api-key
  secret-key: test-secret-key
  mode: test
  redirect-url: http://localhost:8080/api/kashier/payment/success
  webhook-url: http://localhost:8080/api/kashier/webhook
