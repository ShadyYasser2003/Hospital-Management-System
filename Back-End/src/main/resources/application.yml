# =============================================================================
#  Hospital Management System — application.yml
#  All secrets are loaded from environment variables.
#  See .env.example for required variables.
# =============================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:production}

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.hospital.hms: ${LOGGING_LEVEL_APP:INFO}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

hospital:
  name: ${HOSPITAL_NAME:MediCore Hospital}
  email: ${HOSPITAL_EMAIL}
  blood-bank-email: ${BLOOD_BANK_EMAIL:bloodbank@hospital.com}

# ── PayPal ──────────────────────────────────────────────────────────────────
paypal:
  client-id: ${PAYPAL_CLIENT_ID}
  client-secret: ${PAYPAL_CLIENT_SECRET}
  mode: ${PAYPAL_MODE:sandbox}

# ── Kashier ─────────────────────────────────────────────────────────────────
kashier:
  merchant-id: ${KASHIER_MERCHANT_ID}
  api-key: ${KASHIER_API_KEY}
  secret-key: ${KASHIER_SECRET_KEY}
  mode: ${KASHIER_MODE:test}
  redirect-url: ${KASHIER_REDIRECT_URL}
  webhook-url: ${KASHIER_WEBHOOK_URL}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload:
    directory: ${UPLOAD_DIRECTORY:uploads/reports/}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
