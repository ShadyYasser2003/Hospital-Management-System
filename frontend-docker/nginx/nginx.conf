# =============================================================================
#  Nginx main configuration — Frontend (React SPA)
#  Global/top-level settings. Server-block specifics live in conf.d/default.conf
# =============================================================================

# user directive removed — container runs as non-root (nginx user)
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}
 
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging ----------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
 
    # ---- Performance ------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;          # Hide Nginx version in responses/errors.
    types_hash_max_size 2048;

    # ---- Compression (gzip) ----------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf
        application/vnd.ms-fontobject;

    # Load server blocks.
    include /etc/nginx/conf.d/*.conf;
}
