# =============================================================================
#  Nginx server block — React SPA + reverse proxy to backend
#  Uses Kubernetes DNS resolver with variable to avoid startup failures
#  when backend isn't ready yet.
# =============================================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # DNS resolver: CoreDNS IP (resolves both internal K8s names and external domains)
    resolver 172.20.0.10 valid=30s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Reverse proxy: /api → backend ─────────────────────────────────────────
    location /api/ {
        set $backend "hms-backend-backend.hms-production.svc.cluster.local:8080";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Actuator (health checks) ──────────────────────────────────────────────
    location /actuator/ {
        set $backend "hms-backend-backend.hms-production.svc.cluster.local:8080";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Swagger ───────────────────────────────────────────────────────────────
    location /swagger-ui/ {
        set $backend "hms-backend-backend.hms-production.svc.cluster.local:8080";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /v3/api-docs {
        set $backend "hms-backend-backend.hms-production.svc.cluster.local:8080";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Uploads ───────────────────────────────────────────────────────────────
    location /uploads/ {
        set $backend "hms-backend-backend.hms-production.svc.cluster.local:8080";
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── AI Chatbot proxy → API Gateway + Lambda + SageMaker ──────────────────
    location /chatbot-api/ {
        set $chatbot "1poeaxsg2f.execute-api.us-east-1.amazonaws.com";
        proxy_pass         https://$chatbot/;
        proxy_http_version 1.1;
        proxy_set_header   Host $chatbot;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection "";
        proxy_ssl_server_name on;
    }

    # ── React SPA routing ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
