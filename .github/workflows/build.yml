# =============================================================================
#  Build & Push Pipeline — Docker Images + Helm Charts
#  Triggered on push to main (after PR merge).
#  Builds, scans, tags, and pushes images to Amazon ECR.
# =============================================================================

name: Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

permissions:
  id-token: write   # GitHub OIDC → AWS
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1
  BACKEND_REPO: hms/backend
  FRONTEND_REPO: hms/frontend
 
jobs:
  # ── Version Calculation ────────────────────────────────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      sha_short: ${{ steps.sha.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Calculate semantic version
        id: semver
        run: |
          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # Increment patch for every main push (CI determines bump level)
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

  # ── Security Scanning ──────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Populate Maven cache
        working-directory: Back-End/Back-End/hospital-management-system-main
        run: mvn -B dependency:go-offline

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: Front-End/HMS_Front
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 0
          format: table
 
      - name: Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: Back-End/Back-End/hospital-management-system-main
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── Build Backend Image ────────────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [version, security]
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (tags)
        id: meta
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IMAGE="${REGISTRY}/${{ env.BACKEND_REPO }}"
          TAGS="${IMAGE}:${{ needs.version.outputs.version }},${IMAGE}:${{ needs.version.outputs.sha_short }}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}:${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: Back-End/Back-End/hospital-management-system-main
          file: backend-docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          severity: CRITICAL
          exit-code: 1

  # ── Build Frontend Image ───────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [version, security]
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (tags)
        id: meta
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IMAGE="${REGISTRY}/${{ env.FRONTEND_REPO }}"
          TAGS="${IMAGE}:${{ needs.version.outputs.version }},${IMAGE}:${{ needs.version.outputs.sha_short }}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}:${{ needs.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: Front-End/HMS_Front
          file: frontend-docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_CHATBOT_BASE_URL=${{ secrets.VITE_CHATBOT_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          severity: CRITICAL
          exit-code: 1

  # ── Package Helm Charts ────────────────────────────────────────────────────
  helm-package:
    name: Package Helm Charts
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR (OCI registry for Helm)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin \
            ${{ secrets.ECR_REGISTRY }}

      - name: Package and push charts
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"  # Strip 'v' prefix for Helm

          # Build the common library chart first (dependency for backend/frontend)
          echo "📦 Building common library chart..."
          helm package infrastructure/helm/common \
            --version "$VERSION_NUM" \
            -d /tmp/charts/

          for chart in backend frontend ingress; do
            echo "📦 Packaging $chart chart v${VERSION_NUM}..."

            # Update dependencies (resolves hms-common library)
            if [ -f "infrastructure/helm/$chart/Chart.yaml" ]; then
              helm dependency update "infrastructure/helm/$chart" 2>/dev/null || true
            fi

            helm package "infrastructure/helm/$chart" \
              --version "$VERSION_NUM" \
              --app-version "$VERSION_NUM" \
              -d /tmp/charts/

            echo "🚀 Pushing $chart to ECR OCI..."
            helm push "/tmp/charts/hms-${chart}-${VERSION_NUM}.tgz" \
              oci://${{ secrets.ECR_REGISTRY }}/hms-charts || echo "⚠️ Push failed for $chart (non-critical)"
          done
