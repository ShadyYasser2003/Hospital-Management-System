# =============================================================================
#  Build & Push Pipeline
#  Single source of truth for versioning. Version is calculated ONCE here
#  and propagated to all downstream steps and the Deploy workflow.
# =============================================================================

name: Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

permissions:
  id-token: write
  contents: write
  security-events: write

env:
  AWS_REGION: us-east-1
  BACKEND_REPO: hms/backend
  FRONTEND_REPO: hms/frontend

jobs:
  # ── Version (calculated ONCE, used everywhere) ─────────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      version_num: ${{ steps.calc.outputs.version_num }}
      sha_short: ${{ steps.calc.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: calc
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="v0.1.${COMMIT_COUNT}"
          VERSION_NUM="0.1.${COMMIT_COUNT}"

          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"

          echo "══════════════════════════════════════"
          echo "📦 Calculated Version: $VERSION"
          echo "   SHA: $SHA_SHORT"
          echo "   Commit Count: $COMMIT_COUNT"
          echo "══════════════════════════════════════"

      - name: Save version artifact
        run: echo "${{ steps.calc.outputs.version }}" > version.txt

      - uses: actions/upload-artifact@v4
        with:
          name: build-version
          path: version.txt
          retention-days: 5

  # ── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (skip Java deps — scanned in image step)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: 0
          format: table
        env:
          TRIVY_SKIP_DIRS: "Back-End/Back-End/hospital-management-system-main,node_modules,.terraform"

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── Build Backend ──────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [version, security]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Back-End/Back-End/hospital-management-system-main
          file: backend-docker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ needs.version.outputs.version }}
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ needs.version.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Log result
        run: |
          echo "✅ Backend image pushed:"
          echo "   ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ needs.version.outputs.version }}"

  # ── Build Frontend ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [version, security]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Front-End/HMS_Front
          file: frontend-docker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ needs.version.outputs.version }}
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ needs.version.outputs.sha_short }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Log result
        run: |
          echo "✅ Frontend image pushed:"
          echo "   ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ needs.version.outputs.version }}"

  # ── Package Helm Charts ────────────────────────────────────────────────────
  helm-package:
    name: Package Helm Charts
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR (OCI)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin \
            ${{ secrets.ECR_REGISTRY }}

      - name: Package and push
        run: |
          VERSION_NUM="${{ needs.version.outputs.version_num }}"
          echo "📦 Helm version: $VERSION_NUM"

          # Common library
          helm package infrastructure/helm/common \
            --version "$VERSION_NUM" -d /tmp/charts/

          for chart in backend frontend ingress; do
            helm dependency update "infrastructure/helm/$chart" 2>/dev/null || true
            helm package "infrastructure/helm/$chart" \
              --version "$VERSION_NUM" --app-version "$VERSION_NUM" \
              -d /tmp/charts/
            helm push "/tmp/charts/hms-${chart}-${VERSION_NUM}.tgz" \
              oci://${{ secrets.ECR_REGISTRY }}/hms-charts 2>/dev/null || \
              echo "⚠️ Push skipped for $chart (may already exist)"
          done
