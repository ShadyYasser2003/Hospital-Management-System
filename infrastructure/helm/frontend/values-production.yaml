# =============================================================================
#  HMS Frontend — Production Values Override
# =============================================================================

namespace: hms-production
replicaCount: 3

image:
  repository: "529088275461.dkr.ecr.us-east-1.amazonaws.com/hms/frontend"
  tag: "v0.1.47"
  pullPolicy: Always

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  minAvailable: 2
