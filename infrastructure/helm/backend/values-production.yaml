# =============================================================================
#  HMS Backend — Production Values Override
#  Populate secrets via: helm install --set-file or external secrets operator
# =============================================================================

namespace: hms-production
replicaCount: 3

image:
  repository: ""  # Set to ECR URL: <account>.dkr.ecr.<region>.amazonaws.com/hms/backend
  tag: "v0.1.70"
  pullPolicy: Always

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""  # Set to backend IRSA role ARN

resources:
  requests:
    cpu: 512m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  minAvailable: 2

persistence:
  enabled: true
  storageClass: gp3
  size: 50Gi
  # NOTE: This volume is TEMPORARY. In a future phase, uploads will migrate
  # to Amazon S3. At that point, set persistence.enabled=false.
